<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibehuus — a day dedicated to vibecode mastering</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="poster">
      <canvas id="scene"></canvas>

      <div class="title-block">
        <div class="title">Vibehuus</div>
        <div class="subtitle">
          Beyond the prototype: <br />vibecoding for production
        </div>
      </div>

      <!-- Marker positions are driven by RIVER_POINTS in scene.js.
           Edit values there; markers reposition themselves on reload. -->

      <!-- Guide handles (non-marker river control points) -->
      <div class="marker guide" data-id="entry">
        <div class="dot"></div>
        <div class="guide-tag">entry</div>
      </div>
      <div class="marker guide" data-id="topguide">
        <div class="dot"></div>
        <div class="guide-tag">guide</div>
      </div>
      <div class="marker guide" data-id="guide2">
        <div class="dot"></div>
        <div class="guide-tag">guide</div>
      </div>

      <!-- Haus am Fluss — venue -->
      <div class="marker" data-id="haus">
        <div class="dot"></div>
        <div class="label right strong">Haus am Fluss | Bern</div>
      </div>
      <div class="marker guide" data-id="guide3">
        <div class="dot"></div>
        <div class="guide-tag">guide</div>
      </div>

      <!-- Date + time -->
      <div class="marker" data-id="date">
        <div class="dot"></div>
        <div class="label left strong">Friday 5th June 2026</div>
        <!--div class="label right strong">9h–16h</div-->
      </div>

      <!-- Between Date+Time and Enterprise — extra guides -->
      <div class="marker guide" data-id="between">
        <div class="dot"></div>
        <div class="guide-tag">between</div>
      </div>
      <div class="marker guide" data-id="between2">
        <div class="dot"></div>
        <div class="guide-tag">between</div>
      </div>
      <div class="marker guide" data-id="between3">
        <div class="dot"></div>
        <div class="guide-tag">between</div>
      </div>

      <!-- Agenda -->
      <div class="marker" data-id="talks">
        <div class="dot"></div>
        <div class="label right strong">Talks</div>
      </div>

      <div class="marker" data-id="art">
        <div class="dot"></div>
        <div class="label right">Vibecode: from craft to art</div>
      </div>

      <div class="marker" data-id="enterprise">
        <div class="dot"></div>
        <div class="label right">Entreprise grade vibecoding frameworks</div>
      </div>

      <div class="marker" data-id="vibecode">
        <div class="dot"></div>
        <div class="label right">Vibecode reviewing</div>
      </div>

      <div class="marker" data-id="vibehaton">
        <div class="dot"></div>
        <div class="label right strong">Vibehaton workshop</div>
      </div>

      <div class="marker" data-id="apero">
        <div class="dot"></div>
        <div class="label right strong">Apero am Fluss</div>
      </div>

      <!-- Exit handle -->
      <div class="marker guide" data-id="exit">
        <div class="dot"></div>
        <div class="guide-tag">exit</div>
      </div>

      <!-- Sign-up -->
      <form
        class="signup"
        data-state="collapsed"
        novalidate
        action="https://formspree.io/f/xojrqbbg"
        method="POST"
      >
        <div class="signup-fields" inert>
          <input
            type="text"
            name="name"
            placeholder="your name"
            aria-label="your name"
            autocomplete="name"
          />
          <input
            type="email"
            name="email"
            placeholder="your email address"
            aria-label="your email address"
            autocomplete="email"
          />
          <input
            class="signup-honeypot"
            type="text"
            name="_gotcha"
            tabindex="-1"
            autocomplete="off"
            aria-hidden="true"
          />
          <input
            class="signup-honeypot"
            type="text"
            name="company"
            tabindex="-1"
            autocomplete="off"
            aria-hidden="true"
          />
        </div>
        <button type="submit">
          <span class="signup-label" data-for="collapsed">I am interested</span>
          <span class="signup-label" data-for="expanded">Submit</span>
          <span class="signup-label" data-for="submitted">
            Thanks!
            <span class="signup-sublabel">we'll be in touch shortly</span>
          </span>
        </button>
      </form>
    </div>

    <script src="scene.js"></script>
    <script>
      (() => {
        const form = document.querySelector(".signup");
        if (!form) return;
        const fields = form.querySelector(".signup-fields");
        const nameInput = form.querySelector('input[name="name"]');
        const emailInput = form.querySelector('input[name="email"]');
        const honeypots = form.querySelectorAll(".signup-honeypot");

        const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
        const checkValid = () => {
          const nameOk = nameInput.value.trim().length > 0;
          const emailOk = EMAIL_RE.test(emailInput.value.trim());
          form.dataset.valid = nameOk && emailOk ? "true" : "false";
        };
        nameInput.addEventListener("input", checkValid);
        emailInput.addEventListener("input", checkValid);
        checkValid();

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          if (form.dataset.state === "collapsed") {
            form.dataset.state = "expanded";
            fields.inert = false;
            setTimeout(() => nameInput.focus(), 60);
            return;
          }
          if (form.dataset.state === "submitted") return;
          if (form.dataset.valid !== "true") return;
          if ([...honeypots].some((h) => h.value)) return;

          try {
            const res = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: { Accept: "application/json" },
            });
            if (!res.ok) throw new Error("submit failed");
            form.dataset.state = "submitted";
            fields.inert = true;
          } catch {
            form.dataset.valid = "false";
          }
        });
      })();
    </script>
  </body>
</html>
